<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio for Ermano D. Cayard, an IT professional focused on incident and problem analysis, ITSM, identity and access, and healthcare support coordination."
    />
    <title>Ermano D. Cayard | Incident & Problem Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Afacad:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="#top" aria-label="Ermano D. Cayard home">EDC</a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-menu">
          <span class="sr-only">Toggle navigation</span>
          <span></span>
          <span></span>
          <span></span>
        </button>
        <ul class="nav-links" id="primary-menu">
          <li><a href="#work">Projects</a></li>
          <li><a href="#capabilities">Capabilities</a></li>
          <li><a href="#background">Background</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main id="main">
      <section class="hero section" id="top" aria-labelledby="hero-title">
        <div class="section-inner hero-layout" id="hero-content" data-render="hero"></div>
      </section>

      <section class="section projects-section" id="work" aria-labelledby="work-title">
        <div class="section-inner">
          <div class="section-heading">
            <p class="eyebrow">Projects</p>
            <h2 id="work-title">Selected Work</h2>
            <p class="section-note">Projects and case studies with detail available in place.</p>
          </div>
          <div class="project-grid" id="project-list" data-render="projects"></div>
        </div>
      </section>

      <section class="section capabilities-section" id="capabilities" aria-labelledby="capabilities-title">
        <div class="section-inner section-inner-wide">
          <div class="section-heading">
            <p class="eyebrow">Capabilities</p>
            <h2 id="capabilities-title">Tools and Systems</h2>
          </div>
          <div class="capability-field" id="capability-list" data-render="capabilities"></div>
        </div>
      </section>

      <section class="section" id="background" aria-labelledby="background-title">
        <div class="section-inner">
          <div class="section-heading">
            <p class="eyebrow">Background</p>
            <h2 id="background-title">Experience</h2>
          </div>
          <div class="timeline" id="experience-list" data-render="experience"></div>
        </div>
      </section>

      <section class="section contact" id="contact" aria-labelledby="contact-title">
        <div class="section-inner contact-layout" id="contact-content" data-render="contact"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Ermano D. Cayard. Built as a data-driven static portfolio.</p>
    </footer>
  </body>
</html>
